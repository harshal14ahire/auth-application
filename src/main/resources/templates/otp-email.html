<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Passway MFA Verification Code</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f5f7; padding: 40px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" style="max-width: 500px; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); border-radius: 16px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);" cellspacing="0" cellpadding="0" border="0">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px 40px;">
                            <h1 style="margin: 0; font-size: 26px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; display: inline-flex; align-items: center; gap: 8px;">
                                🔐 Passway MFA
                            </h1>
                            <p style="margin: 12px 0 0 0; color: #cbd5e0; font-size: 14px; font-weight: 400;">
                                Secure Verification Service
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 0 40px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                                <tr>
                                    <td align="center" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; padding: 32px 24px; backdrop-filter: blur(10px);">
                                        <p style="margin: 0 0 16px 0; color: #a0aec0; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;">
                                            One-Time Verification Code
                                        </p>
                                        <span style="display: block; font-size: 42px; font-weight: 800; letter-spacing: 8px; color: #a78bfa; font-family: 'Courier New', Courier, monospace; line-height: 1;">
                                            {{otpCode}}
                                        </span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer Details -->
                    <tr>
                        <td align="center" style="padding: 32px 40px 40px 40px;">
                            <p style="margin: 0 0 8px 0; color: #e2e8f0; font-size: 13px;">
                                This code is valid for <strong style="color: #fbbf24;">5 minutes</strong>.
                            </p>
                            <p style="margin: 0; color: #94a3b8; font-size: 12px;">
                                If you did not request this code, please ignore this email or contact support if you suspect unauthorized access.
                            </p>
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin-top: 32px; border-top: 1px solid rgba(255, 255, 255, 0.1); width: 100%;">
                                <tr>
                                    <td align="center" style="padding-top: 20px; color: #64748b; font-size: 11px;">
                                        &copy; 2026 Passway Personal Security. All rights reserved.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
